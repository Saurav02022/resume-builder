# Runs only after "E2E Playwright" succeeds on main, and only when backend paths changed.
# Manual override: workflow_dispatch (no E2E gate).
name: Deploy Backend (GCP)

on:
  workflow_run:
    workflows: ["E2E Playwright"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  gate:
    name: Gate (E2E + paths)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      should_deploy: ${{ steps.compute.outputs.should_deploy }}
      sha: ${{ steps.compute.outputs.sha }}
    steps:
      - name: Compute deploy SHA and path match
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          gh api "repos/${{ github.repository }}/commits/$SHA" --jq '.files[].filename' > changed.txt
          SHOULD=false
          while IFS= read -r f || [ -n "$f" ]; do
            [ -z "$f" ] && continue
            case "$f" in
              backend/*|.github/workflows/deploy-backend.yml) SHOULD=true ;;
            esac
          done < changed.txt
          echo "should_deploy=$SHOULD" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build & Deploy
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.sha }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/resume-builder-backend:${{ needs.gate.outputs.sha }} ./backend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/resume-builder-backend:${{ needs.gate.outputs.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy resume-builder-backend \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/resume-builder-backend:${{ needs.gate.outputs.sha }} \
            --region us-central1 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
